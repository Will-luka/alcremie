<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Pokémon Unite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Calculadora Pokémon Unite</h1>
    <p class="subtitle">Preencha os valores, escolha a build e veja os resultados.</p>

    <div class="tabs">
      <button class="tab active" data-tab="valores">Valores</button>
      <button class="tab" data-tab="build">Build</button>
      <button class="tab" data-tab="resultados">Fórmulas</button>
    </div>

    <section id="valores" class="panel active">
      <div class="grid">
        <label>SpAtk base
          <input type="number" id="spAtk" placeholder="Ex.: 300" />
        </label>
        <label>Level
          <input type="number" id="level" placeholder="Ex.: 10" />
        </label>
      </div>
    </section>

    <section id="build" class="panel">
      <p class="hint">Selecione até 3 itens. Sp Atk Specs e Drive Lens possuem stacks configuráveis.</p>

      <div class="items-grid">
        <label class="check-item"><input type="checkbox" class="item" value="choiceSpecs"> Choice Specs</label> <img src="Choice+Specs.png" alt="Choice Specs" class="item-img">
        <label class="check-item"><input type="checkbox" class="item" value="spAtkSpecs"> Sp Atk Specs</label> <img src="Sp.+Atk+Specs.png" alt="Sp Atk Specs" class="item-img">
        <label class="check-item"><input type="checkbox" class="item" value="wiseGlasses"> Wise Glasses</label> <img src="Wise+Glasses.png" alt="Wise Glasses" class="item-img">
        <label class="check-item"><input type="checkbox" class="item" value="driveLens"> Drive Lens</label> <img src="Drive+Lens.png" alt="Drive Lens" class="item-img">
        <label class="check-item"><input type="checkbox" class="item" value="rescueHood"> Rescue Hood</label> <img src="Rescue+Hood.png" alt="Rescue Hood" class="item-img">
      </div>

      <div class="grid stacks">
        <label>Stacks do Sp Atk Specs (1 a 6)
          <input type="number" id="spAtkSpecsStacks" min="1" max="6" value="1" />
        </label>
        <label>Stacks do Drive Lens (0 a 20)
          <input type="number" id="driveLensStacks" min="0" max="20" value="0" />
        </label>
      </div>

      <p id="buildError" class="error"></p>
      <button id="calcular">Calcular</button>
    </section>

    <section id="resultados" class="panel">
      <div class="formula-card">
        <h2>Recover</h2> <img src="Recover.png" alt="Recover" class="skill-img">
        <p><strong>Cura:</strong> <span data-output="recoverCura">0</span></p>
        <p><strong>Cura Boostada:</strong> <span data-output="recoverBoost">0</span></p>
      </div>

      <div class="formula-card">
        <h2>Sweet Scent</h2> <img src="Sweet Scent" alt="Sweet Scent" class="skill-img">
        <p><strong>Dano - Explosão:</strong> <span data-output="sweetExplosion">0</span></p>
        <p><strong>Dano - Anel externo:</strong> <span data-output="sweetOuter">0</span></p>
      </div>

      <p id="erro" class="error"></p>
      <p class="small" id="spAtkFinalText"></p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
